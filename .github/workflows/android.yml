name: Android Build

# Builds the signed Android AAB (Play Store) + a debug APK (sideload).
# Gated: only runs on version tags (v*) or manual dispatch — the smoke CI in
# ci.yml is what guards every push/PR. A real release needs the signing secrets
# documented in docs/BUILD_ANDROID.md to be present in the repo's GitHub secrets.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  GODOT_RELEASE: "stable"

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # JDK 17 is required by the Godot 4.3 Gradle Android build template.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Provides ANDROID_HOME / ANDROID_SDK_ROOT + cmdline-tools.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "build-tools;34.0.0" "platforms;android-34"
          yes | sdkmanager --licenses >/dev/null

      - name: Cache Godot + export templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}-android

      - name: Install Godot + export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}"
          mkdir -p ~/godot
          # Headless editor binary (can run exports).
          curl -fsSL -o /tmp/godot.zip "${BASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip"
          unzip -o /tmp/godot.zip -d ~/godot
          mv ~/godot/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64 ~/godot/godot
          chmod +x ~/godot/godot
          # Export templates (must match the engine version exactly).
          curl -fsSL -o /tmp/templates.tpz "${BASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          unzip -o /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

      - name: Point Godot at the JDK + Android SDK
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres <<EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/android_sdk_path = "${ANDROID_SDK_ROOT}"
          EOF

      - name: Import project
        run: ~/godot/godot --headless --path game --import

      # Installs the Gradle Android build template into game/android/build/.
      - name: Install Gradle build template
        run: ~/godot/godot --headless --path game --install-android-build-template

      # --- Signing ---------------------------------------------------------
      # Release builds need a keystore. Provide it via repo secrets:
      #   ANDROID_KEYSTORE_BASE64  (base64 of your .keystore)
      #   ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD
      # A throwaway debug keystore is generated below so the debug APK can build
      # even without release secrets.
      - name: Generate debug keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey \
            -keypass android -keystore /tmp/debug.keystore \
            -storepass android -dname "CN=Android Debug,O=Android,C=US" \
            -validity 9999 -deststoretype pkcs12
          {
            echo "GODOT_ANDROID_KEYSTORE_DEBUG_PATH=/tmp/debug.keystore"
            echo "GODOT_ANDROID_KEYSTORE_DEBUG_USER=androiddebugkey"
            echo "GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD=android"
          } >> "$GITHUB_ENV"

      - name: Decode release keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore
          {
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_PATH=/tmp/release.keystore"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_USER=${{ secrets.ANDROID_KEY_ALIAS }}"
            echo "GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}"
          } >> "$GITHUB_ENV"

      # --- Exports ---------------------------------------------------------
      - name: Export debug APK (sideload)
        run: |
          mkdir -p build
          ~/godot/godot --headless --path game --export-debug "Android APK" ../build/enough-debug.apk

      - name: Export release AAB (Play Store)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p build
          ~/godot/godot --headless --path game --export-release "Android" ../build/enough.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: enough-android
          path: |
            build/*.apk
            build/*.aab
          if-no-files-found: warn
